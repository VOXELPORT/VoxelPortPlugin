name: VoxelPort
version: '1.2.0'
main: io.voxelport.plugin.VoxelPortPlugin
api-version: '1.21'
description: Host your Paper server without port forwarding via VoxelPort relay
authors: [trazhub]

commands:
  voxelport:
    description: VoxelPort status and controls
    usage: /voxelport [status|reload|reconnect|stats]
    permission: voxelport.bypass

permissions:
  voxelport.admin:
    description: Full access to all VoxelPort commands (reload, reconnect, stats, maintenance)
    default: op
    children:
      voxelport.bypass: true
  voxelport.bypass:
    description: Read-only access — allows /voxelport status only
    default: false
