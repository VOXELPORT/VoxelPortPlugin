name: VoxelPort
version: '1.0.0'
main: io.voxelport.plugin.VoxelPortPlugin
description: Host your server without port forwarding via VoxelPort relay
authors: [trazhub]

commands:
  voxelport:
    description: VoxelPort status and controls
    usage: /voxelport [status|reload]
    permission: voxelport.admin

permissions:
  voxelport.admin:
    description: Access VoxelPort commands
    default: op
